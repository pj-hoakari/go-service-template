# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
    proto:
        desc: Lint proto and regenerate connect-go code for development.
        cmds:
            - task: proto:lint
            - task: proto:gen:go

    proto:lint:
        desc: Lint proto.
        cmds:
            - buf lint

    proto:gen:go:
        desc: Regenerate connect-go code from proto.
        cmds:
            - buf generate --template buf.gen.go.yaml
        sources:
            - "proto/**/*.proto"
            - buf.yaml
            - buf.gen.go.yaml
        generates:
            - "gen/**/*"
