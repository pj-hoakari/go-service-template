# yaml-language-server: $schema=https://www.schemastore.org/buf.gen.json
version: v2
managed:
    enabled: true
    override:
        - file_option: go_package_prefix
          value: github.com/pj-hoakari/go-service-template/gen
    disable:
        # authz options are provided by protoc-gen-authz-go as a Go package.
        - file_option: go_package
          path: authz/v1/options.proto
plugins:
    - local: ["go", "tool", "protoc-gen-go"]
      out: gen
      opt: paths=source_relative
    - local: ["go", "tool", "protoc-gen-authz-go"]
      out: gen
      opt: paths=source_relative
    - local: ["go", "tool", "protoc-gen-connect-go"]
      out: gen
      opt: paths=source_relative
inputs:
    - directory: proto
      exclude_paths:
        - proto/authz
