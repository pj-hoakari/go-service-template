name: Check Generated Code

on:
    pull_request:
        paths:
            - "proto/**"
            - "gen/**"
            - "buf.yaml"
            - "buf.gen.go.yaml"
            - "go.mod"
            - "go.sum"
            - "Taskfile.yml"
            - ".github/workflows/proto-gen-check.yml"
    push:
        branches: [main]
        paths:
            - "proto/**"
            - "gen/**"
            - "buf.yaml"
            - "buf.gen.go.yaml"
            - "go.mod"
            - "go.sum"
            - "Taskfile.yml"
            - ".github/workflows/proto-gen-check.yml"

permissions:
    contents: read

jobs:
    drift-check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up buf
              uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
              with:
                  setup_only: true
                  version: 1.70.0
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Go
              uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
              with:
                  go-version-file: go.mod

            - name: Set up Task
              uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
              with:
                  version: 3.x
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Lint proto
              run: task proto:lint

            - name: Regenerate connect-go code
              run: task proto:gen:go

            - name: Verify generated code is up to date
              run: |
                  if [ -n "$(git status --porcelain -- gen/)" ]; then
                    echo "::error::gen/ が最新ではありません"
                    git status --porcelain -- gen/
                    git diff -- gen/
                    exit 1
                  fi
