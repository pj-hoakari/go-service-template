name: Publish Docker Image

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            version:
                description: "公開するバージョン（vX.Y.Z または vX.Y.Z-suffix）"
                required: false
                type: string

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

permissions:
    contents: read
    packages: write
    id-token: write

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Resolve version
              id: version
              env:
                  INPUT_VERSION: ${{ inputs.version }}
              run: |
                  set -euo pipefail
                  RAW="$INPUT_VERSION"
                  if [ -z "$RAW" ] && [ "$GITHUB_EVENT_NAME" = "release" ]; then
                    RAW="$GITHUB_REF_NAME"
                  fi
                  if [ -z "$RAW" ]; then
                    echo "::error::バージョンを決定できません（workflow_dispatch では version 入力が必要です）"
                    exit 1
                  fi

                  VERSION="${RAW#v}"
                  if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
                    echo "::error::想定外のタグ/バージョン形式: '$RAW'（vX.Y.Z または vX.Y.Z-suffix。例: v0.1.0, v0.1.0-rc）"
                    exit 1
                  fi

                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "image version: $VERSION"

            - name: Set up QEMU
              uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
              with:
                  platforms: arm64

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
                      type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
                      type=semver,pattern={{major}},value=${{ steps.version.outputs.version }},enable=${{ !startsWith(steps.version.outputs.version, '0.') }}
                      type=raw,value=latest,enable=${{ !contains(steps.version.outputs.version, '-') }}

            - name: Build and push
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  provenance: true
                  sbom: true
